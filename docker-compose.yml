services:
  rest-server:
    container_name: ${REST_SERVER_CONTAINER_NAME}
    image: restic/rest-server:${REST_SERVER_IMAGE_TAG}
    restart: unless-stopped
    environment:
      PASSWORD_FILE: ${REST_SERVER_PASSWORD_FILE}
      OPTIONS: ${REST_SERVER_OPTIONS}
    volumes:
      - type: bind
        source: ${REST_SERVER_DATA_ROOT}
        target: /data
    networks:
      - npm_proxy

networks:
  npm_proxy:
    external: true
    name: npm_proxy
